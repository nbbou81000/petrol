name: Update Oil Prices

on:
  schedule:
    # Toutes les 30 min, 6h-22h UTC, du lundi au vendredi
    # (marché pétrolier actif quasi 24h/24 mais on limite pour épargner le quota Actions)
    - cron: '7,37 6-22 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch oil prices
        run: node scripts/fetch-oil.mjs

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update oil prices $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
