name: Update Oil Prices

on:
  workflow_dispatch: {}
  schedule:
    # Filet de sécurité seulement (au cas où le déclencheur externe
    # cron-job.org tombe en panne) — pas la fréquence réelle attendue.
    - cron: '17 */3 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch oil prices
        run: node scripts/fetch-oil.mjs

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update oil prices $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
